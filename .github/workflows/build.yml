name: build-and-push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64 REQUIRED by grader)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          tags: |
            ghcr.io/alancai27/amd_track2:latest
            ghcr.io/alancai27/amd_track2:${{ github.sha }}

      - name: Sanity-check pushed manifest is linux/amd64
        run: |
          docker buildx imagetools inspect ghcr.io/alancai27/amd_track2:latest | tee manifest.txt
          grep -q "linux/amd64" manifest.txt

      - name: Smoke-test on 12 clips (3 examples x 4)
        timeout-minutes: 20
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p io/input io/output
          # 12 tasks = grading-set load; unique task_ids, same 3 URLs repeated.
          python3 - <<'PY'
          import json
          from pathlib import Path
          urls = [
            "https://storage.googleapis.com/amd-hackathon-clips/1860079-uhd_2560_1440_25fps.mp4",
            "https://storage.googleapis.com/amd-hackathon-clips/13825391-uhd_3840_2160_30fps.mp4",
            "https://storage.googleapis.com/amd-hackathon-clips/3044693-uhd_3840_2160_24fps.mp4",
          ]
          styles = ["formal", "sarcastic", "humorous_tech", "humorous_non_tech"]
          tasks = []
          for i in range(12):
            tasks.append({
              "task_id": f"v{i+1}",
              "video_url": urls[i % 3],
              "styles": styles,
            })
          Path("io/input/tasks.json").write_text(json.dumps(tasks, indent=2))
          print(f"wrote {len(tasks)} tasks")
          PY

          docker pull ghcr.io/alancai27/amd_track2:latest

          echo "---- container logs ----"
          docker run --rm \
            -e GROQ_API_KEY="${GROQ_API_KEY}" \
            -e INPUT_PATH=/input/tasks.json \
            -e OUTPUT_PATH=/output/results.json \
            -v "${{ github.workspace }}/io/input:/input" \
            -v "${{ github.workspace }}/io/output:/output" \
            ghcr.io/alancai27/amd_track2:latest \
            2>&1 | tee smoke.log

          echo "---- results ----"
          cat io/output/results.json
          echo

          echo "---- perception summary ----"
          grep -E '\[main\].*real perception|GROQ key=|perception=' smoke.log || true

          # Fail the job if most clips fell back (score would be ~0).
          python3 - <<'PY'
          import re, sys
          log = open("smoke.log").read()
          m = re.search(r"(\d+)/(\d+) clips got real perception", log)
          if not m:
              print("WARNING: no perception summary line found")
              sys.exit(0)
          real, total = int(m.group(1)), int(m.group(2))
          print(f"parsed: {real}/{total} real perception")
          if real < max(1, total // 2):
              print(f"FAIL: only {real}/{total} got real perception "
                    f"(likely 429s or bad key)")
              sys.exit(1)
          PY
