name: build-and-push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64 REQUIRED by grader)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/alancai27/amd_track2:latest
            ghcr.io/alancai27/amd_track2:${{ github.sha }}

      - name: Sanity-check pushed manifest is linux/amd64
        run: |
          docker buildx imagetools inspect ghcr.io/alancai27/amd_track2:latest | tee manifest.txt
          grep -q "linux/amd64" manifest.txt
